name: Build feed

on:
  schedule:
    - cron: "0 13 * * *"   # 06:00 America/Los_Angeles (13:00 UTC). Adjust to taste.
  workflow_dispatch:        # lets you trigger a build by hand from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build the feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COVERAGE_TOKEN: ${{ secrets.COVERAGE_TOKEN }}
        run: python build.py

      - name: Commit the rebuilt page
        run: |
          git config user.name  "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add docs/index.html data/cache.json
          git diff --staged --quiet || git commit -m "feed: $(date -u +'%Y-%m-%d')"
          git push
